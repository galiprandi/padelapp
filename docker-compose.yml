services:
  db:
    image: postgres:16-alpine
    container_name: padelred-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: padelred
      POSTGRES_PASSWORD: padelred
      POSTGRES_DB: padelred
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padelred"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
