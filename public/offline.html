<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a0a0b">
  <title>Sin conexión — Padel Red</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #fbbf24;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon svg { width: 40px; height: 40px; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #a1a1aa; line-height: 1.5; max-width: 280px; margin-bottom: 1.5rem; }
    button {
      background: #fbbf24;
      color: #0a0a0b;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M160 220 C200 220 200 292 256 292 C312 292 312 220 352 220" stroke="#0a0a0b" stroke-width="32" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <h1>Sin conexión</h1>
  <p>No pudimos cargar Padel Red. Verificá tu conexión a internet e intentá de nuevo.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
